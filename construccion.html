<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página en Construcción</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
    text-align:center;
}

.contenedor{
    max-width:900px;
    padding:40px;
}

h1{
    font-size:55px;
    margin-bottom:20px;
    color:#FFD54F;
}

p{
    font-size:24px;
    margin-bottom:30px;
    color:#E3F2FD;
}

img{
    width:700px;
    max-width:100%;
    height:auto;
    border-radius:15px;
    background:#fff;
    padding:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.5);
}
</style>

</head>
<body>

<div class="contenedor">

    <h1>🚧 BAJO CONSTRUCCIÓN 🚧</h1>

    <p>
        Estamos trabajando para ofrecerte un mejor sitio web.<br>
        ¡Pronto estaremos de vuelta!
    </p>

    <img src="contruccion.webp" alt="Bajo Construcción">

</div>

</body>
</html>
