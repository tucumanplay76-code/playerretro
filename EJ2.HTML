<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta etiquetas esenciales para dispositivos móviles (evita zoom y oculta barras si se añade a inicio) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ROBOTECH</title>
    
    <style>
        /* Reiniciamos márgenes y forzamos a que ocupe toda la ventana */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* El iframe ocupa el 100% del espacio disponible */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Pantalla de inicio táctil/clic para activar pantalla completa */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1b 100%);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #fff;
            text-align: center;
            transition: opacity 0.5s ease-out;
        }

        /* Estilos de diseño retro/arcade para la pantalla de carga */
        .arcade-title {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #ff3e6c;
            text-shadow: 0 0 10px rgba(255, 62, 108, 0.8), 0 0 20px rgba(255, 62, 108, 0.5);
            margin-bottom: 10px;
            animation: pulse 1.5s infinite alternate;
        }

        .arcade-subtitle {
            font-size: 1.2rem;
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
            margin-bottom: 40px;
            font-weight: 600;
        }

        .start-prompt {
            font-size: 1.5rem;
            background: linear-gradient(45deg, #ff3e6c, #ffbe0b);
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(255, 62, 108, 0.4);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes pulse {
            from { transform: scale(0.98); }
            to { transform: scale(1.02); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Mensaje de aviso flotante en caso de bloqueo */
        #error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100000;
            display: none;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            max-width: 80%;
        }
    </style>
</head>
<body>
  <h1>ROBOTECH</h1>

<style>
/* ======== BANNER ESTILO ======== */
.banner-info {
  display: block;           /* Ocupa todo el ancho */
  background: linear-gradient(90deg, #ffcc00 0%, #ff6600 100%);
  color: #000;
  text-align: center;
  font-family: 'Press Start 2P', cursive; /* Fuente retro opcional */
  padding: 15px 10px;
  font-size: 14px;
  letter-spacing: 1px;
  border-bottom: 3px solid #000;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  position: sticky;     /* Siempre visible al hacer scroll */
  top: 0;
  z-index: 9999;
  text-decoration: none;    /* Quita subrayado */
  transition: background 0.3s ease;
}

.banner-info:hover {
  background: linear-gradient(90deg, #ffee00 0%, #ff8800 100%);
}

/* 🔹 Ajuste en pantallas chicas */
@media (max-width: 600px) {
  .banner-info {
    font-size: 10px;
    padding: 10px 5px;
  }
}
</style>
