 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robotech - The Macross Saga</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.game-container{
    width:70%;
    max-width:700px;
    aspect-ratio:4 / 3;
}

.game-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* Celulares */
@media (max-width:768px){
    .game-container{
        width:95%;
        aspect-ratio:4 / 3;
    }
}
</style>

</head>
<body>

<div class="game-container">
    <iframe
        src="https://www.retrogames.cc/embed/26883-robotech-the-macross-saga-u-mode7.html"
        frameborder="0"
        allowfullscreen
        webkitallowfullscreen
        mozallowfullscreen
        scrolling="no"
        allow="cross-origin-isolated">
    </iframe>
</div>

</body>
</html>
