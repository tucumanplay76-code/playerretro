    <style>
        body{
            background:#000;

        h1{
            font-size:clamp(28px,6vw,60px);

        }

        img{
            width:100%;
            max-width:700px;
            height:auto;
        }
    </style>

</head>

<body>
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    if (confirm("¿Deseas añadir esta aplicación a la pantalla principal?")) {
        deferredPrompt.prompt();

        deferredPrompt.userChoice.then(() => {
            deferredPrompt = null;
        });
    }
});
</script>


    <h1>🚧 BAJO CONSTRUCCIÓN 🚧</h1>

<p>
        Estamos trabajando para ofrecerte un mejor sitio web.<br>
        ¡Pronto estaremos de vuelta!
    </p>


    <img src="con1.webp" alt="Bajo Construcción">

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
