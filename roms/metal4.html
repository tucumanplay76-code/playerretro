
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Retro Player</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

/* PC */
.game-container{
    width:700px;
    height:525px;
}
/* El iframe ocupa todo el contenedor */
.game-container iframe{
    width:100%;
    height:100%;
    border:none;
    display:block;
}

/* Tablets */
@media screen and (max-width:1024px){

    .game-container{
        width:95vw;
        height:71vw;
        max-height:90vh;
    }

}

/* Celulares */
@media screen and (max-width:768px){

    html,body{
        overflow:hidden;
    }

    .game-container{
        width:100vw;
        height:100vh;
    }

    .game-container iframe{
        width:100%;
        height:100%;
    }

}

</style>

</head>

<body>

<div class="game-container">

<iframe
src="https://www.retrogames.cc/embed/9161-metal-slug-4-ngh-2630.html"
frameborder="0"
allowfullscreen
webkitallowfullscreen
mozallowfullscreen
scrolling="no"
allow="cross-origin-isolated">
</iframe>

</div>

</body>
</html>
